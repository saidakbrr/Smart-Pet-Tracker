<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pet Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Smart Pet Tracker</h1>
    <div id="data">
        <p><strong>Latitude:</strong> <span id="latitude">Loading...</span></p>
        <p><strong>Longitude:</strong> <span id="longitude">Loading...</span></p>
        <p><strong>Motion:</strong> <span id="motion">Loading...</span></p>
        <p><strong>Status:</strong> <span id="status">Loading...</span></p>
    </div>
    <div id="map"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js"></script>

    <!-- Leaflet JS (for the map) -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <script src="script.js"></script>
</body>
</html>
